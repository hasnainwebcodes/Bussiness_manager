{% extends "home.html" %}

{% block title %}Create New Project - {{ company.name }}{% endblock %}

{% block content %}

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card bg-dark border-secondary shadow-sm">
        <div class="card-body p-5">

          <h2 class="text-center mb-4 fw-bold">Create New Project</h2>

          {% if messages %}
            {% for m in messages %}
              <div class="alert alert-{{ m.tags }} alert-dismissible fade show">
                {{ m }}
              </div>
            {% endfor %}
          {% endif %}

          <form method="post">
            {% csrf_token %}
            
            <div class="mb-4">
              <label class="form-label">Project Name</label>
              <input type="text" 
                     name="name" 
                     class="form-control form-control-lg bg-dark text-white border-secondary"
                     placeholder="e.g. Website Redesign" 
                     required autofocus>
            </div>

            <button type="submit" class="btn btn-success btn-lg w-100 py-3 mb-3">
              Create Project
            </button>
          </form>

          <a href="{% url 'projects' %}" class="btn btn-outline-secondary w-100">
            ← Back to All Projects
          </a>

        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
