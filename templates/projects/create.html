{% extends "home.html" %}{% block content %}

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card bg-dark text-white shadow-sm">
        <div class="card-body">
          <h3 class="card-title mb-4">Create project</h3>
          {% if messages %}
            {% for m in messages %}
              <div class="alert alert-{{ m.tags }}">{{ m }}</div>
            {% endfor %}
          {% endif %}
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Project name</label>
              <input type="text" class="form-control" name="name" required/>
            </div>
            <button type="submit" class="btn btn-lg w-100 btn-primary">Create project</button>
          </form>
          <div class="mt-3">
            <a href="{% url 'projects' %}" class="btn btn-outline-secondary w-100">Back to projects</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
