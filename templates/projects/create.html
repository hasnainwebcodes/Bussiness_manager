{% extends "home.html" %}
{% block title %}New Project — {{ company.name }}{% endblock %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">

    <div class="mb-4">
      <a href="{% url 'projects' %}" class="text-secondary text-decoration-none small">
        <i class="bi bi-arrow-left me-1"></i>Back to Projects
      </a>
      <h2 class="text-white fw-bold mt-2">Create New Project</h2>
    </div>

    {% if company.plan == 'free' %}
    <div class="alert mb-4" style="background:rgba(234,179,8,0.08); border:1px solid rgba(234,179,8,0.25); border-radius:8px;">
      <i class="bi bi-exclamation-triangle text-warning me-2"></i>
      <span class="text-warning"><strong>Free plan:</strong> You can create up to 3 projects.</span>
    </div>
    {% endif %}

    <div class="card p-4">
      <form method="post">
        {% csrf_token %}
        <div class="mb-4">
          <label class="form-label text-secondary small fw-bold text-uppercase">Project Name</label>
          <input type="text" name="name"
                 class="form-control form-control-lg"
                 style="background:#0f1117; color:#e2e8f0; border-color:var(--border);"
                 placeholder="e.g. Website Redesign" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label text-secondary small fw-bold text-uppercase">Description</label>
          <textarea name="description" rows="3" class="form-control"
                    style="background:#0f1117; color:#e2e8f0; border-color:var(--border);"
                    placeholder="What is this project about?"></textarea>
        </div>
        <div class="mb-4">
          <label class="form-label text-secondary small fw-bold text-uppercase">Initial Status</label>
          <select name="status" class="form-select"
                  style="background:#0f1117; color:#e2e8f0; border-color:var(--border);">
            <option value="planning" selected>Planning</option>
            <option value="active">Active</option>
            <option value="on_hold">On Hold</option>
          </select>
        </div>
        <button type="submit" class="btn btn-success btn-lg w-100 fw-bold">
          <i class="bi bi-plus-circle me-2"></i>Create Project
        </button>
      </form>
    </div>

  </div>
</div>

{% endblock %}
