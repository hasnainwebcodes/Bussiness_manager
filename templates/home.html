<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}BusinessManager{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #121212;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    main {
      flex: 1;
    }
    .hero {
      background: linear-gradient(rgba(15,23,42,0.9), rgba(15,23,42,0.8)),
                  url('https://images.unsplash.com/photo-1559526324-593bc073d938?auto=format&fit=crop&q=80&w=1920') center/cover no-repeat;
    }
    .card {
      background: #1a1f24;
      border: 1px solid #333a40;
    }
  </style>
</head>
<body class="bg-dark text-white">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'home' %}">BusinessManager</a>

      <div class="ms-auto">
        {% if request.user.is_authenticated %}
          <!-- Internal Navigation for Logged-in Users -->
          <div class="navbar-nav d-flex flex-row gap-3">
            <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
            <a class="nav-link" href="{% url 'projects' %}">Projects</a>
            <a class="nav-link" href="{% url 'view_team' %}">Team</a>
            <a class="nav-link" href="{% url 'billing' %}">Billing</a>
            
            <div class="dropdown">
              <button class="btn btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown">
                {{ request.user.email }}
              </button>
              <ul class="dropdown-menu dropdown-menu-dark">
                <li><a class="dropdown-item" href="{% url 'user_logout' %}">Logout</a></li>
              </ul>
            </div>
          </div>
        {% else %}
          <!-- Public Navigation -->
          <a href="{% url 'user_login' %}" class="btn btn-outline-light me-2">Login</a>
          <a href="{% url 'register' %}" class="btn btn-primary">Get Started</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <!-- Flash Messages -->
  {% if messages %}
  <div class="container mt-3">
    {% for m in messages %}
      <div class="alert alert-{{ m.tags }} alert-dismissible fade show">
        {{ m }}
      </div>
    {% endfor %}
  </div>
  {% endif %}

  <!-- Page Content -->
  <main>
    <div class="container py-4">
      {% block content %}{% endblock %}
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-black py-4 text-center text-secondary">
    <div class="container">
      <small>© 2026 BusinessManager. All rights reserved.</small>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
