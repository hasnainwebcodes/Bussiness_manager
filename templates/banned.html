{% extends "home.html" %}
{% block title %}Workspace Suspended{% endblock %}
{% block content %}
<div class="row justify-content-center py-5">
  <div class="col-md-6 text-center">
    <div class="card p-5">
      <div class="fs-1 mb-3">🚫</div>
      <h2 class="text-danger fw-bold mb-2">Workspace Suspended</h2>
      <p class="text-secondary mb-4">
        <strong class="text-white">{{ company.name }}</strong> has been suspended 
        for violating our terms of service. Contact support if you believe this 
        is a mistake.
      </p>
      <div class="d-flex justify-content-center gap-3">
        <a href="{% url 'create_company' %}" class="btn btn-primary px-4">
          <i class="bi bi-building me-2"></i>Create New Workspace
        </a>
        <a href="{% url 'user_logout' %}" class="btn btn-outline-secondary px-4">
          Logout
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
