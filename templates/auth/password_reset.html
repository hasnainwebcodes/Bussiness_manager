{% extends "home.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="row justify-content-center py-5">
  <div class="col-md-6 col-lg-5">
    <div class="text-center mb-4">
      <h2 class="text-white fw-bold">Forgot Password?</h2>
      <p class="text-secondary">Enter your email and we'll send you a reset link.</p>
    </div>
    <div class="card p-4">
      <form method="post">
        {% csrf_token %}
        <div class="mb-4">
          <label class="form-label text-secondary small fw-bold text-uppercase">Email Address</label>
          <input type="email" name="email"
                 class="form-control form-control-lg"
                 style="background:#0f1117; color:#e2e8f0; border-color:var(--border);"
                 placeholder="you@company.com" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">
          <i class="bi bi-envelope me-2"></i>Send Reset Link
        </button>
      </form>
      <div class="text-center mt-3">
        <a href="{% url 'user_login' %}" class="text-secondary small text-decoration-none">
          ← Back to Login
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
