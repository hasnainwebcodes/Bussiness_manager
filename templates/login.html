{% extends "home.html" %}

{% block title %}Login - BusinessManager{% endblock %}

{% block content %}

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm bg-dark border-secondary">
        <div class="card-body p-4 p-md-5">
          
          <h2 class="text-center mb-4 fw-bold">Welcome Back</h2>
          
          {% if messages %}
            {% for m in messages %}
              <div class="alert alert-{{ m.tags }} alert-dismissible fade show">
                {{ m }}
              </div>
            {% endfor %}
          {% endif %}

          <form method="post">
            {% csrf_token %}
            
            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <input type="email" 
                     name="email" 
                     class="form-control bg-dark text-white border-secondary" 
                     placeholder="you@company.com" 
                     required>
            </div>

            <div class="mb-4">
              <label class="form-label">Password</label>
              <input type="password" 
                     name="password" 
                     class="form-control bg-dark text-white border-secondary" 
                     required>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100 py-3">
              Log In
            </button>
          </form>

          <div class="text-center mt-4 text-secondary">
            Don't have an account? 
            <a href="{% url 'register' %}" class="text-light fw-medium">Create one here</a>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
