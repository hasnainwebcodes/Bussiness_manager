{% extends "home.html" %}
{% block title %}Edit Task — {{ task.title }}{% endblock %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">

    <div class="mb-4">
      <a href="{% url 'project_detail' project.id %}" class="text-secondary text-decoration-none small">
        <i class="bi bi-arrow-left me-1"></i>Back to {{ project.name }}
      </a>
      <h2 class="text-white fw-bold mt-2">Edit Task</h2>
    </div>

    <div class="card p-4">
      <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
          <label class="form-label text-secondary small fw-bold text-uppercase">Task Title</label>
          <input type="text" name="title"
                 class="form-control form-control-lg"
                 style="background:#0f1117; color:#e2e8f0; border-color:var(--border);"
                 value="{{ task.title }}" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label text-secondary small fw-bold text-uppercase">Instructions / Description</label>
          <textarea name="description" rows="3" class="form-control"
                    style="background:#0f1117; color:#e2e8f0; border-color:var(--border);">{{ task.description|default:'' }}</textarea>
        </div>
        <div class="mb-4">
          <label class="form-label text-secondary small fw-bold text-uppercase">Assign To</label>
          <select name="assignee" class="form-select"
                  style="background:#0f1117; color:#e2e8f0; border-color:var(--border);">
            <option value="">Unassigned</option>
            {% for m in members %}
              <option value="{{ m.id }}"
                {% if task.assigned_to and task.assigned_to.id == m.id %}selected{% endif %}>
                {{ m.user.email }}
              </option>
            {% endfor %}
          </select>
        </div>
        <div class="d-flex gap-3">
          <button type="submit" class="btn btn-success flex-grow-1 fw-bold">
            <i class="bi bi-check-circle me-2"></i>Save Changes
          </button>
          <a href="{% url 'project_detail' project.id %}" class="btn btn-outline-secondary px-4">
            Cancel
          </a>
        </div>
      </form>
    </div>

    <!-- Delete Zone -->
    <div class="card mt-4 p-4" style="border-color:#dc3545 !important;">
      <h6 class="text-danger fw-bold mb-1">
        <i class="bi bi-exclamation-triangle me-2"></i>Danger Zone
      </h6>
      <p class="text-secondary small mb-3">
        Deleting this task is permanent and cannot be undone.
      </p>
      <form method="POST" action="{% url 'task_delete' task.id %}"
            onsubmit="return confirm('Delete task \'{{ task.title }}\'? This cannot be undone.')">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger btn-sm px-4">
          <i class="bi bi-trash me-2"></i>Delete Task
        </button>
      </form>
    </div>

  </div>
</div>

{% endblock %}
